<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>FINAL LEVEL APP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  transition:0.3s;
}

/* THEMES */
.light{background:#f4f4f4;color:#000;}
.dark{background:#1e1e1e;color:#fff;}

/* LOGIN */
#login{
  position:fixed;
  width:100%;
  height:100%;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* DASHBOARD */
#app{display:none;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:200px;
  height:100vh;
  background:#000;
  padding-top:20px;
}

.sidebar button{
  width:100%;
  padding:10px;
  background:none;
  color:white;
  border:none;
  cursor:pointer;
}

.sidebar button:hover{
  background:#1abc9c;
}

/* CONTENT */
.content{
  margin-left:210px;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.dark .card{background:#333;color:white;}

/* INPUT */
input{
  padding:10px;
  margin:5px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px;
  display:none;
}
</style>
</head>

<body class="light">

<!-- LOGIN -->
<div id="login">
  <h2>🔐 Giriş</h2>
  <input id="u" placeholder="kullanıcı">
  <input id="p" type="password" placeholder="şifre">
  <button onclick="login()">Giriş Yap</button>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <button onclick="show('home')">🏠 Ana</button>
  <button onclick="show('game')">🎮 Oyun</button>
  <button onclick="show('quiz')">🧠 Quiz</button>
  <button onclick="show('notes')">📝 Notlar</button>
  <button onclick="theme()">🌙 Tema</button>
</div>

<div class="content">

<!-- HOME -->
<div id="home">
  <h1>Dashboard</h1>

  <div class="card">👤 Kullanıcı: Admin</div>
  <div class="card">⏰ Saat: <span id="time"></span></div>
</div>

<!-- GAME -->
<div id="game" style="display:none">
  <h1>🎮 Oyun</h1>
  <div class="card">
    <input id="g">
    <button onclick="play()">Tahmin</button>
    <p id="r"></p>
    <p>Skor: <span id="s">0</span></p>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" style="display:none">
  <h1>🧠 Quiz</h1>
  <div class="card">
    HTML nedir?<br>
    <button onclick="q(1)">Dil</button>
    <button onclick="q(0)">Oyun</button>
  </div>
</div>

<!-- NOTES -->
<div id="notes" style="display:none">
  <h1>📝 Notlar</h1>
  <div class="card">
    <input id="n">
    <button onclick="add()">Ekle</button>
    <ul id="list"></ul>
  </div>
</div>

</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

let score=0;
let num=Math.floor(Math.random()*10);

// LOGIN
function login(){
  if(document.getElementById("u").value){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }
}

// SHOW PAGES
function show(id){
  let d=["home","game","quiz","notes"];
  d.forEach(x=>document.getElementById(x).style.display="none");
  document.getElementById(id).style.display="block";
}

// GAME
function play(){
  let x=document.getElementById("g").value;

  if(x==num){
    score++;
    document.getElementById("r").innerText="Doğru 🎉";
  }else{
    document.getElementById("r").innerText="Yanlış 😅";
  }

  document.getElementById("s").innerText=score;
  num=Math.floor(Math.random()*10);
}

// QUIZ
function q(a){
  notify(a==1?"Doğru ✔":"Yanlış ❌");
}

// NOTES
function add(){
  let v=document.getElementById("n").value;
  let li=document.createElement("li");
  li.innerText=v;
  document.getElementById("list").appendChild(li);
  notify("Not eklendi");
}

// THEME
function theme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

// CLOCK
setInterval(()=>{
  let d=new Date();
  document.getElementById("time").innerText=
  d.getHours()+":"+d.getMinutes()+":"+d.getSeconds();
},1000);

// NOTIFY
function notify(m){
  let t=document.getElementById("toast");
  t.innerText=m;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}

</script>

</body>
</html>
