<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>David Goggins </title>

<style>
body{
  margin:0;
  font-family:Arial;
  transition:0.3s;
}

/* LOGIN SCREEN */
#login{
  position:fixed;
  width:100%;
  height:100%;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* THEME */
.light{background:#f4f4f4;color:#000;}
.dark{background:#1e1e1e;color:#fff;}

/* MENU */
.menu{
  position:fixed;
  width:200px;
  height:100vh;
  background:#111;
  padding-top:20px;
}

.menu button{
  width:100%;
  padding:10px;
  background:none;
  color:white;
  border:none;
  cursor:pointer;
}

.menu button:hover{
  background:#1abc9c;
}

/* CONTENT */
.content{
  margin-left:210px;
  padding:20px;
}

.card{
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.dark .card{background:#333;color:white;}

input,button{
  padding:10px;
  margin:5px;
  width:100%;
}
</style>
</head>

<body class="light">

<!-- 🔐 LOGIN -->
<div id="login">
  <h1>🔐 Giriş</h1>
  <input id="u" placeholder="Kullanıcı adı">
  <input id="p" type="password" placeholder="Şifre">
  <button onclick="login()">Giriş Yap</button>
  <p id="err"></p>
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="show('feed')">📱 Feed</button>
  <button onclick="show('games')">🎮 Oyunlar</button>
  <button onclick="show('tools')">🧰 Araçlar</button>
  <button onclick="show('robot')">🤖 Robot</button>
  <button onclick="theme()">🌙 Tema</button>
</div>

<div class="content">

<!-- FEED -->
<div id="feed">
  <h1>📱 Feed</h1>

  <input id="post">
  <button onclick="addPost()">Paylaş</button>

  <div id="posts"></div>
</div>

<!-- GAMES -->
<div id="games" style="display:none">

  <h1>🎮 Oyunlar</h1>

  <div class="card">
    🎯 Tahmin
    <input id="guess">
    <button onclick="game()">Oyna</button>
    <p id="gRes"></p>
  </div>

  <div class="card">
    ⚡ Refleks
    <button onclick="startR()">Başlat</button>
    <button id="click" onclick="clickR()" style="display:none">Tıkla</button>
    <p id="rRes"></p>
  </div>

  <div class="card">
    🎲 Şans
    <button onclick="luck()">Çevir</button>
    <p id="luck"></p>
  </div>

</div>

<!-- TOOLS -->
<div id="tools" style="display:none">

  <h1>🧰 Araçlar</h1>

  🎲 <button onclick="dice()">Zar</button>
  <p id="dice"></p>

  🔐 <button onclick="gen()">Şifre</button>
  <p id="pass"></p>

  📝 <input id="note">
  <button onclick="note()">Not Ekle</button>
  <ul id="list"></ul>

</div>

<!-- ROBOT -->
<div id="robot" style="display:none">

  <h1>🤖 Robot</h1>

  <input id="msg">
  <button onclick="bot()">Gönder</button>
  <p id="reply"></p>

</div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [];
let num = Math.floor(Math.random()*10);
let start;

/* 🔐 LOGIN (SENİN İSTEDİĞİN) */
function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  if(u==="Yasin" && p==="3169"){
    document.getElementById("login").style.display="none";
  } else {
    document.getElementById("err").innerText="Hatalı giriş ❌";
  }
}

/* NAV */
function show(id){
  ["feed","games","tools","robot"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

/* FEED */
function addPost(){
  let t=document.getElementById("post").value;
  posts.unshift({text:t});
  localStorage.setItem("posts",JSON.stringify(posts));
  render();
}

function render(){
  let box=document.getElementById("posts");
  box.innerHTML="";
  posts.forEach(p=>{
    box.innerHTML+="<div class='card'>"+p.text+"</div>";
  });
}
render();

/* GAME */
function game(){
  let x=document.getElementById("guess").value;
  document.getElementById("gRes").innerText =
  (x==num)?"Doğru 🎉":"Yanlış 😅";
  num=Math.floor(Math.random()*10);
}

/* REFLEX */
function startR(){
  document.getElementById("click").style.display="none";
  setTimeout(()=>{
    document.getElementById("click").style.display="block";
    start=Date.now();
  },Math.random()*2000+1000);
}

function clickR(){
  document.getElementById("rRes").innerText =
  (Date.now()-start)+" ms";
}

/* LUCK */
function luck(){
  document.getElementById("luck").innerText =
  Math.random()<0.5?"😢":"🎉";
}

/* TOOLS */
function dice(){
  document.getElementById("dice").innerText =
  Math.floor(Math.random()*6)+1;
}

function gen(){
  document.getElementById("pass").innerText =
  Math.random().toString(36).slice(-8);
}

function note(){
  let v=document.getElementById("note").value;
  let li=document.createElement("li");
  li.innerText=v;
  document.getElementById("list").appendChild(li);
}

/* ROBOT */
function bot(){
  let m=document.getElementById("msg").value.toLowerCase();

  let r="";
  if(m.includes("merhaba")) r="Selam 😎";
  else if(m.includes("saat")) r=new Date().toLocaleTimeString();
  else r="Anlamadım 🤔";

  document.getElementById("reply").innerText=r;
}

/* THEME */
function theme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
