<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ULTRA PLATFORM</title>

<style>
body{margin:0;font-family:Arial;transition:0.3s;}
.light{background:#f4f4f4;color:#000;}
.dark{background:#1e1e1e;color:#fff;}

.menu{
  position:fixed;width:200px;height:100vh;
  background:#111;padding-top:20px;
}
.menu button{
  width:100%;padding:10px;background:none;
  color:white;border:none;cursor:pointer;
}
.menu button:hover{background:#1abc9c;}

.content{margin-left:210px;padding:20px;}

.card{
  background:#fff;padding:15px;margin:10px 0;
  border-radius:10px;
}
.dark .card{background:#333;color:white;}

input,button{padding:10px;margin:5px;width:100%;}
</style>
</head>

<body class="light">

<!-- MENU -->
<div class="menu">
  <button onclick="show('feed')">📱 Feed</button>
  <button onclick="show('games')">🎮 Oyunlar</button>
  <button onclick="show('chat')">💬 Chat</button>
  <button onclick="show('music')">🎵 Müzik</button>
  <button onclick="show('gallery')">🖼️ Galeri</button>
  <button onclick="show('profile')">👤 Profil</button>
  <button onclick="show('tools')">🗒️ Araçlar</button>
  <button onclick="theme()">🌙 Tema</button>
</div>

<div class="content">

<!-- FEED -->
<div id="feed">
  <h1>📱 Feed</h1>
  <input id="post"><button onclick="addPost()">Paylaş</button>
  <div id="posts"></div>
</div>

<!-- GAMES -->
<div id="games" style="display:none">
  <h1>🎮 Oyunlar</h1>

  🎯 <input id="guess"><button onclick="guess()">Tahmin</button><p id="g1"></p>

  ⚡ <button onclick="refStart()">Refleks</button>
  <button id="click" onclick="refClick()" style="display:none">Tıkla</button>
  <p id="g2"></p>

  🎲 <button onclick="luck()">Şans</button><p id="g3"></p>

  🧠 <button onclick="mem()">Hafıza</button>
  <input id="memIn"><button onclick="memCheck()">Kontrol</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">
  <h1>💬 Chat</h1>
  <input id="msg"><button onclick="send()">Gönder</button>
  <div id="chatBox"></div>
</div>

<!-- MUSIC -->
<div id="music" style="display:none">
  <h1>🎵 Müzik</h1>

  <audio controls>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
  </audio>
</div>

<!-- GALLERY -->
<div id="gallery" style="display:none">
  <h1>🖼️ Galeri</h1>

  <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/David_Goggins_2018.jpg"
  style="width:200px;border-radius:10px;">
</div>

<!-- PROFILE -->
<div id="profile" style="display:none">
  <h1>👤 Profil</h1>

  <div class="card" style="text-align:center">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/David_Goggins_2018.jpg"
    style="width:120px;height:120px;border-radius:50%;">

    <h2>Halil Yasin Aygün</h2>
    <p>📧 aygunyasin123.@gmail.com</p>
    <p>🎂 18</p>
    <p>🎓 Öğrenci</p>
  </div>
</div>

<!-- TOOLS -->
<div id="tools" style="display:none">
  <h1>🗒️ Araçlar</h1>

  🎲 <button onclick="dice()">Zar</button><p id="d"></p>

  🔐 <button onclick="pass()">Şifre</button><p id="p"></p>

  📝 <input id="note"><button onclick="addNote()">Not</button>
  <ul id="list"></ul>
</div>

</div>

<script>

let posts=[];
let memory="";
let start;
let score=0;

/* NAV */
function show(id){
  ["feed","games","chat","music","gallery","profile","tools"]
  .forEach(x=>document.getElementById(x).style.display="none");
  document.getElementById(id).style.display="block";
}

/* FEED */
function addPost(){
  posts.unshift(document.getElementById("post").value);
  render();
}
function render(){
  document.getElementById("posts").innerHTML=
  posts.map(p=>`<div class="card">${p}</div>`).join("");
}
render();

/* GAME */
function guess(){
  let n=Math.floor(Math.random()*10);
  document.getElementById("g1").innerText=
  (document.getElementById("guess").value==n)?"Doğru":"Yanlış";
}

/* REFLEX */
function refStart(){
  setTimeout(()=>{
    document.getElementById("click").style.display="block";
    start=Date.now();
  },1000+Math.random()*2000);
}
function refClick(){
  document.getElementById("g2").innerText=
  Date.now()-start+" ms";
}

/* LUCK */
function luck(){
  document.getElementById("g3").innerText=
  Math.random()<0.5?"Kaybettin":"Kazandın";
}

/* MEMORY */
function mem(){
  let w=["kedi","araba","uzay"];
  memory=w[Math.floor(Math.random()*3)];
  alert(memory);
}
function memCheck(){
  alert(document.getElementById("memIn").value==memory?"Doğru":"Yanlış");
}

/* CHAT */
function send(){
  let m=document.getElementById("msg").value;
  document.getElementById("chatBox").innerHTML+=
  "<div class='card'>"+m+"</div>";
}

/* TOOLS */
function dice(){
  document.getElementById("d").innerText=Math.floor(Math.random()*6)+1;
}
function pass(){
  document.getElementById("p").innerText=Math.random().toString(36).slice(-8);
}
function addNote(){
  let li=document.createElement("li");
  li.innerText=document.getElementById("note").value;
  document.getElementById("list").appendChild(li);
}

/* THEME */
function theme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
