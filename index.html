<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ULTIMATE PLATFORM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  transition:0.3s;
}

/* LOGIN */
#login{
  position:fixed;
  width:100%;
  height:100%;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* THEME */
.light{background:#f4f4f4;color:#000;}
.dark{background:#1e1e1e;color:#fff;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:230px;
  height:100vh;
  background:#111;
  padding-top:20px;
}

.sidebar button{
  width:100%;
  padding:10px;
  background:none;
  color:white;
  border:none;
  cursor:pointer;
}

.sidebar button:hover{
  background:#1abc9c;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.dark .card{background:#333;color:white;}

/* POST */
.post{
  background:#222;
  color:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

/* INPUT */
input,button{
  padding:10px;
  margin:5px;
  width:100%;
}
</style>
</head>

<body class="light">

<!-- LOGIN -->
<div id="login">
  <h1>🔐 LOGIN</h1>
  <input id="u" placeholder="admin">
  <input id="p" type="password" placeholder="1234">
  <button onclick="login()">Giriş</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="show('feed')">📱 Feed</button>
  <button onclick="show('games')">🎮 Oyunlar</button>
  <button onclick="show('tools')">🧰 Araçlar</button>
  <button onclick="show('robot')">🤖 Robot</button>
  <button onclick="theme()">🌙 Tema</button>
</div>

<div class="content">

<!-- FEED -->
<div id="feed">
  <h1>📱 Social Feed</h1>

  <input id="postText" placeholder="Ne düşünüyorsun?">
  <button onclick="addPost()">Paylaş</button>

  <div id="feedBox"></div>
</div>

<!-- GAMES -->
<div id="games" style="display:none">

  <h1>🎮 Oyunlar</h1>

  <div class="card">
    🎯 Tahmin Oyunu
    <input id="g">
    <button onclick="guess()">Oyna</button>
    <p id="gRes"></p>
  </div>

  <div class="card">
    ⚡ Refleks
    <button onclick="startR()">Başlat</button>
    <button id="clickBtn" onclick="clickR()" style="display:none">Tıkla!</button>
    <p id="rRes"></p>
  </div>

  <div class="card">
    🎲 Şans
    <button onclick="luck()">Çevir</button>
    <p id="luckRes"></p>
  </div>

  <div class="card">
    🧠 Hafıza
    <button onclick="memShow()">Göster</button>
    <input id="memIn">
    <button onclick="memCheck()">Kontrol</button>
  </div>

</div>

<!-- TOOLS -->
<div id="tools" style="display:none">
  <h1>🧰 Araçlar</h1>

  🎲 <button onclick="dice()">Zar</button>
  <p id="dice"></p>

  🔐 <button onclick="gen()">Şifre</button>
  <p id="pass"></p>

  📝 <input id="note"><button onclick="noteAdd()">Not</button>
  <ul id="notes"></ul>
</div>

<!-- ROBOT -->
<div id="robot" style="display:none">
  <h1>🤖 Robot</h1>
  <input id="msg">
  <button onclick="bot()">Gönder</button>
  <p id="reply"></p>
</div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [];
let num = Math.floor(Math.random()*10);
let memory="";
let startTime;

// LOGIN
function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  if(u==="admin" && p==="1234"){
    document.getElementById("login").style.display="none";
  }
}

// NAV
function show(id){
  ["feed","games","tools","robot"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

/* FEED */
function addPost(){
  let t=document.getElementById("postText").value;

  posts.unshift({text:t,likes:0});
  localStorage.setItem("posts",JSON.stringify(posts));
  render();
}

function render(){
  let box=document.getElementById("feedBox");
  box.innerHTML="";

  posts.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="post">
        ${p.text}<br>
        ❤️ ${p.likes}
      </div>
    `;
  });
}

render();

/* GAME 1 */
function guess(){
  let x=document.getElementById("g").value;
  document.getElementById("gRes").innerText =
  (x==num)?"Doğru 🎉":"Yanlış 😅";
  num=Math.floor(Math.random()*10);
}

/* REFLEX */
function startR(){
  document.getElementById("clickBtn").style.display="none";
  setTimeout(()=>{
    document.getElementById("clickBtn").style.display="block";
    startTime=Date.now();
  },Math.random()*2000+1000);
}

function clickR(){
  document.getElementById("rRes").innerText =
  "Süre: " + (Date.now()-startTime) + " ms";
}

/* LUCK */
function luck(){
  let r=Math.random();
  document.getElementById("luckRes").innerText=
  r<0.3?"😢":"r<0.6?"🙂":"🎉";
}

/* MEMORY */
function memShow(){
  let w=["kedi","araba","uzay"];
  memory=w[Math.floor(Math.random()*w.length)];
  alert(memory);
}

function memCheck(){
  let v=document.getElementById("memIn").value;
  alert(v===memory?"Doğru":"Yanlış");
}

/* TOOLS */
function dice(){
  document.getElementById("dice").innerText=
  Math.floor(Math.random()*6)+1;
}

function gen(){
  document.getElementById("pass").innerText=
  Math.random().toString(36).slice(-8);
}

function noteAdd(){
  let v=document.getElementById("note").value;
  let li=document.createElement("li");
  li.innerText=v;
  document.getElementById("notes").appendChild(li);
}

/* ROBOT */
function bot(){
  let m=document.getElementById("msg").value.toLowerCase();

  let r="";

  if(m.includes("merhaba")) r="Selam 😎";
  else if(m.includes("oyun")) r="Oyunlar açık 🎮";
  else if(m.includes("saat")) r=new Date().toLocaleTimeString();
  else r="Bilmiyorum 🤔";

  document.getElementById("reply").innerText=r;
}

/* THEME */
function theme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
